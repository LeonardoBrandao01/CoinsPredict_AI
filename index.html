<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Moedas BRL</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <div class="brand-icon">R$</div>
        <h1>Portal de Identificação</h1>
        <p>Aproxime a moeda da câmera para autenticação de valor em tempo real.</p>

        <div class="controls">
            <button id="toggle-camera-btn" type="button" onclick="toggleCamera()">Ativar Câmera</button>
            <button id="upload-btn" type="button" onclick="document.getElementById('image-input').click()">Subir Imagem</button>
            <input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
        </div>


        <div id="webcam-wrapper" class="hidden">
            <div class="scanning-overlay"></div>
            <div id="webcam-container"></div>
            <img id="image-preview" src="" alt="Preview" class="hidden">
        </div>


        <div id="result-badge" class="hidden">---</div>
    </div>

    <!-- TensorFlow.js and Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/SIX-uUM6Y/";

        let model, webcam, maxPredictions;
        let isCameraActive = false;
        let loopFrameId;

        const toggleBtn = document.getElementById("toggle-camera-btn");
        const uploadBtn = document.getElementById("upload-btn");
        const webcamWrapper = document.getElementById("webcam-wrapper");
        const webcamContainer = document.getElementById("webcam-container");
        const imagePreview = document.getElementById("image-preview");
        const labelContainer = document.getElementById("result-badge");

        async function initModel() {
            if (!model) {
                toggleBtn.disabled = true;
                uploadBtn.disabled = true;
                toggleBtn.innerText = "Carregando modelo...";
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                toggleBtn.disabled = false;
                uploadBtn.disabled = false;
                toggleBtn.innerText = "Ativar Câmera";
            }
        }

        async function toggleCamera() {
            if (isCameraActive) {
                await stopCamera();
            } else {
                await startCamera();
            }
        }

        async function startCamera() {
            await initModel();
            clearImagePreview();

            toggleBtn.disabled = true;
            toggleBtn.innerText = "Iniciando...";

            const flip = true;
            webcam = new tmImage.Webcam(350, 350, flip);

            try {
                await webcam.setup();
                await webcam.play();
                isCameraActive = true;

                toggleBtn.disabled = false;
                toggleBtn.innerText = "Desativar Câmera";
                toggleBtn.classList.add('active-btn');
                uploadBtn.classList.add('muted-btn');

                webcamWrapper.classList.remove('hidden');
                labelContainer.classList.remove('hidden');
                labelContainer.innerHTML = "Identificando...";

                webcamContainer.innerHTML = '';
                webcamContainer.appendChild(webcam.canvas);

                loop();
            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                toggleBtn.disabled = false;
                toggleBtn.innerText = "Ativar Câmera";
                alert("Não foi possível acessar a câmera.");
            }
        }

        async function stopCamera() {
            isCameraActive = false;
            if (loopFrameId) {
                clearTimeout(loopFrameId);
                loopFrameId = null;
            }
            if (webcam) {
                webcam.stop();
                webcamContainer.innerHTML = '';
            }
            toggleBtn.innerText = "Ativar Câmera";
            toggleBtn.classList.remove('active-btn');
            uploadBtn.classList.remove('muted-btn');
            
            if (!imagePreview.src || imagePreview.classList.contains('hidden')) {
                webcamWrapper.classList.add('hidden');
                labelContainer.classList.add('hidden');
            }
        }

        function clearImagePreview() {
            imagePreview.src = "";
            imagePreview.classList.add('hidden');
            webcamContainer.classList.remove('hidden');
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (isCameraActive) await stopCamera();
            await initModel();

            const reader = new FileReader();
            reader.onload = async function (e) {
                imagePreview.src = e.target.result;
                imagePreview.classList.remove('hidden');
                webcamContainer.classList.add('hidden');
                webcamWrapper.classList.remove('hidden');
                labelContainer.classList.remove('hidden');
                labelContainer.innerHTML = "Processando imagem...";

                imagePreview.onload = async () => {
                    await predict(imagePreview);
                };
            };
            reader.readAsDataURL(file);
        }

        async function loop() {
            if (!isCameraActive) return;
            webcam.update();
            await predict(webcam.canvas);
            loopFrameId = setTimeout(loop, 650); // Increased interval to 650ms
        }

        async function predict(source) {
            if (!model || !source) return;
            const prediction = await model.predict(source);
            let highestProb = 0;
            let bestLabel = "";

            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestLabel = prediction[i].className;
                }
            }

            if (highestProb > 0.85) {
                labelContainer.innerHTML = bestLabel;
                labelContainer.classList.add('found');
            } else {
                labelContainer.innerHTML = "Identificando...";
                labelContainer.classList.remove('found');
            }
        }
    </script>
</body>

</html>
